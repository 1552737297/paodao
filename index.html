<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 竞赛排行榜 · 分组排名</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #222240;
            --gold: #f0c060;
            --gold-light: #ffe9b0;
            --silver: #bcc6d0;
            --silver-light: #e0e5ea;
            --bronze: #d4a574;
            --bronze-light: #f5d5b8;
            --success: #4caf84;
            --success-bg: #1a3a2a;
            --danger: #e0556a;
            --danger-bg: #3a1a22;
            --pending: #8899aa;
            --pending-bg: #1e2730;
            --text: #e0e0e8;
            --text-secondary: #a0a0b8;
            --border: #333358;
            --accent: #6c8cff;
            --accent-hover: #8aa4ff;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(100, 120, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(240, 180, 80, 0.05) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        /* 头部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .header .title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .icon-trophy {
            font-size: 2.4rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-6px);
            }
            85% {
                transform: translateY(0);
            }
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #f0c060, #ffe9b0, #f0c060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .header .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf84;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(76, 175, 132, 0.6);
            }
            50% {
                opacity: 0.5;
                box-shadow: 0 0 0 8px rgba(76, 175, 132, 0);
            }
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            padding: 16px;
            background: var(--surface2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .toolbar .section-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-right: 4px;
            white-space: nowrap;
            font-weight: 600;
        }
        .toolbar input[type="text"],
        .toolbar input[type="file"] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
            font-family: inherit;
        }
        .toolbar input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 140, 255, 0.1);
        }
        .toolbar input[type="text"] {
            flex: 1;
            min-width: 180px;
            max-width: 350px;
        }
        .toolbar input[type="file"] {
            display: none;
        }
        .btn {
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 16px rgba(108, 140, 255, 0.3);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--surface2);
            border-color: #555;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            background: #5cc498;
            box-shadow: 0 0 14px rgba(76, 175, 132, 0.3);
        }
        .btn-danger {
            background: transparent;
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger-bg);
            box-shadow: 0 0 14px rgba(224, 85, 106, 0.25);
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.78rem;
            border-radius: 4px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 0.7rem;
            border-radius: 3px;
        }
        .divider-dot {
            color: var(--border);
            font-weight: bold;
            margin: 0 2px;
            user-select: none;
        }

        /* 全局统计条 */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            padding: 12px 16px;
            background: var(--surface2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            align-items: center;
        }
        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stats-bar .stat-value {
            font-weight: 700;
            color: var(--text);
            font-size: 0.95rem;
        }
        .stats-bar .stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            display: inline-block;
        }
        .stat-dot.success-dot {
            background: var(--success);
        }
        .stat-dot.danger-dot {
            background: var(--danger);
        }
        .stat-dot.pending-dot {
            background: var(--pending);
        }

        /* 分组排行榜区域 */
        .groups-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .group-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }
        .group-header .group-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.4px;
        }
        .group-header .group-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success);
        }
        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .badge-pending {
            background: var(--pending-bg);
            color: var(--pending);
            border: 1px solid var(--pending);
        }
        .group-stats {
            display: flex;
            gap: 16px;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
        .group-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .group-stats .stat-val {
            font-weight: 700;
            color: var(--text);
        }

        /* 表格容器 - 每个组内 */
        .table-wrapper {
            overflow-x: auto;
            max-height: 45vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .table-wrapper::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
            table-layout: auto;
        }
        table thead {
            position: sticky;
            top: 0;
            z-index: 5;
        }
        table thead th {
            background: #1e1e3a;
            padding: 10px 10px;
            text-align: center;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            user-select: none;
        }
        table tbody tr {
            transition: background 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        table tbody tr.row-gold {
            background: rgba(240, 192, 96, 0.08);
        }
        table tbody tr.row-gold:hover {
            background: rgba(240, 192, 96, 0.14);
        }
        table tbody tr.row-silver {
            background: rgba(188, 198, 208, 0.05);
        }
        table tbody tr.row-silver:hover {
            background: rgba(188, 198, 208, 0.1);
        }
        table tbody tr.row-bronze {
            background: rgba(212, 165, 116, 0.05);
        }
        table tbody tr.row-bronze:hover {
            background: rgba(212, 165, 116, 0.1);
        }
        table tbody td {
            padding: 8px 10px;
            text-align: center;
            vertical-align: middle;
        }

        /* 排名样式 */
        .rank-cell {
            font-weight: 700;
            font-size: 1rem;
            min-width: 55px;
        }
        .rank-medal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1rem;
        }
        .rank-gold {
            background: linear-gradient(135deg, #f0c060, #d4a030);
            color: #3d2200;
            box-shadow: 0 0 12px rgba(240, 192, 96, 0.5);
        }
        .rank-silver {
            background: linear-gradient(135deg, #d8dce3, #a8b0ba);
            color: #2a2a30;
            box-shadow: 0 0 10px rgba(188, 198, 208, 0.4);
        }
        .rank-bronze {
            background: linear-gradient(135deg, #e0b890, #b88050);
            color: #3d1f00;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        }
        .rank-normal {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .rank-na {
            color: #555;
            font-size: 0.8rem;
        }

        /* 输入框 */
        input.table-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            width: 100%;
            max-width: 130px;
            text-align: center;
            transition: var(--transition);
            outline: none;
            font-family: inherit;
            min-width: 80px;
        }
        input.table-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 140, 255, 0.12);
            background: #1c1c35;
        }
        input.status-input {
            max-width: 120px;
            min-width: 90px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
        }
        input.status-input.status-success {
            border-color: var(--success);
            background: var(--success-bg);
            color: #7ee8b8;
            box-shadow: 0 0 8px rgba(76, 175, 132, 0.2);
        }
        input.status-input.status-danger {
            border-color: var(--danger);
            background: var(--danger-bg);
            color: #f0909e;
            box-shadow: 0 0 8px rgba(224, 85, 106, 0.2);
        }
        input.score-input {
            max-width: 100px;
            min-width: 70px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            letter-spacing: 0.5px;
        }
        input.name-input {
            max-width: 140px;
            min-width: 100px;
            text-align: left;
            padding-left: 12px;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
            line-height: 1;
        }
        .delete-btn:hover {
            color: #e0556a;
            background: rgba(224, 85, 106, 0.15);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.35s ease-out, fadeOut 0.35s ease-in forwards;
            animation-delay: 0s, 2s;
            pointer-events: auto;
            max-width: 350px;
        }
        .toast.success {
            border-left: 3px solid var(--success);
        }
        .toast.info {
            border-left: 3px solid var(--accent);
        }
        .toast.warning {
            border-left: 3px solid #f0a040;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 16px 12px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar input[type="text"] {
                max-width: 100%;
            }
            .group-header {
                flex-direction: column;
                align-items: flex-start;
            }
            input.table-input {
                max-width: 90px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-group">
                <span class="icon-trophy">🏆</span>
                <h1>竞赛排行榜</h1>
            </div>
            <div class="badge"><span class="dot"></span> 分组排名·自动保存</div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <span class="section-label">📋 名单</span>
            <input type="text" id="importTextInput" placeholder="粘贴名单（每行一个姓名，或逗号分隔）">
            <button class="btn btn-primary" id="btnImport">📥 导入</button>
            <button class="btn btn-outline" id="btnAppendImport">➕ 追加</button>
            <span class="divider-dot">•</span>
            <label class="btn btn-outline" for="fileInput">📁 文件导入</label>
            <input type="file" id="fileInput" accept=".txt,.csv">
            <span class="divider-dot">•</span>
            <button class="btn btn-success" id="btnAddOne">＋ 添加选手</button>
            <button class="btn btn-danger" id="btnClearAll">🗑 清空</button>
            <button class="btn btn-outline btn-sm" id="btnExport">💾 导出备份</button>
            <button class="btn btn-outline btn-sm" id="btnImportBackup" onclick="document.getElementById('backupFileInput').click()">📤 恢复备份</button>
            <input type="file" id="backupFileInput" accept=".json" style="display:none;">
        </div>

        <!-- 全局统计 -->
        <div class="stats-bar" id="statsBar">
            <span class="stat-item">📊 总人数：<span class="stat-value" id="statTotal">0</span></span>
            <span class="stat-item"><span class="stat-dot success-dot"></span> 撤离成功：<span class="stat-value" id="statSuccess">0</span></span>
            <span class="stat-item"><span class="stat-dot danger-dot"></span> 撤离失败：<span class="stat-value" id="statFail">0</span></span>
            <span class="stat-item"><span class="stat-dot pending-dot"></span> 未标记：<span class="stat-value" id="statPending">0</span></span>
            <span class="stat-item">⭐ 全局最高分：<span class="stat-value" id="statBest">-</span></span>
        </div>

        <!-- 分组排行榜容器 -->
        <div class="groups-container" id="groupsContainer">
            <!-- 动态生成三个分组卡片 -->
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'ranking_board_data_v2_grouped';

            let participants = [];

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        if (Array.isArray(data)) {
                            participants = data.map(item => ({
                                id: item.id || generateId(),
                                name: String(item.name || '').trim(),
                                status: ['撤离成功', '撤离失败'].includes(item.status) ? item.status : '',
                                score: (item.score !== null && item.score !== undefined && !isNaN(Number(item
                                    .score))) ? Number(item.score) : null,
                            }));
                            return;
                        }
                    }
                } catch (e) {
                    console.warn('数据加载失败', e);
                }
                participants = [];
            }

            function saveData() {
                try {
                    const dataToSave = participants.map(p => ({
                        id: p.id,
                        name: p.name,
                        status: p.status,
                        score: p.score,
                    }));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
                } catch (e) {
                    showToast('⚠️ 自动保存失败', 'warning');
                }
            }

            function generateId() {
                return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 8);
            }

            // 分组并各自排序
            function getGroupedData() {
                const success = [];
                const fail = [];
                const pending = [];
                participants.forEach(p => {
                    if (p.status === '撤离成功') success.push(p);
                    else if (p.status === '撤离失败') fail.push(p);
                    else pending.push(p);
                });
                const sortGroup = (arr) => {
                    return [...arr].sort((a, b) => {
                        const aHas = a.score !== null && !isNaN(a.score);
                        const bHas = b.score !== null && !isNaN(b.score);
                        if (aHas && bHas) {
                            if (b.score !== a.score) return b.score - a.score;
                            return a.name.localeCompare(b.name, 'zh-CN');
                        }
                        if (aHas && !bHas) return -1;
                        if (!aHas && bHas) return 1;
                        return a.name.localeCompare(b.name, 'zh-CN');
                    });
                };
                return {
                    success: sortGroup(success),
                    fail: sortGroup(fail),
                    pending: sortGroup(pending),
                };
            }

            function computeGroupRanks(sortedList) {
                const ranked = [];
                let currentRank = 1;
                for (let i = 0; i < sortedList.length; i++) {
                    const p = sortedList[i];
                    const hasScore = p.score !== null && !isNaN(p.score);
                    if (!hasScore) {
                        ranked.push({ ...p, rank: null, rankDisplay: '-' });
                        continue;
                    }
                    if (i === 0) {
                        ranked.push({ ...p, rank: currentRank, rankDisplay: String(currentRank) });
                        continue;
                    }
                    const prev = sortedList[i - 1];
                    const prevHasScore = prev.score !== null && !isNaN(prev.score);
                    if (!prevHasScore) {
                        currentRank = i + 1;
                        ranked.push({ ...p, rank: currentRank, rankDisplay: String(currentRank) });
                        continue;
                    }
                    if (p.score === prev.score) {
                        ranked.push({ ...p, rank: currentRank, rankDisplay: String(currentRank) });
                    } else {
                        currentRank = i + 1;
                        ranked.push({ ...p, rank: currentRank, rankDisplay: String(currentRank) });
                    }
                }
                return ranked;
            }

            function getRankClass(rank) {
                if (rank === 1) return 'rank-gold';
                if (rank === 2) return 'rank-silver';
                if (rank === 3) return 'rank-bronze';
                return 'rank-normal';
            }

            function getRowClass(rank) {
                if (rank === 1) return 'row-gold';
                if (rank === 2) return 'row-silver';
                if (rank === 3) return 'row-bronze';
                return '';
            }

            function escapeAttr(str) {
                return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g,
                    '&gt;');
            }

            function renderGroupCard(groupName, groupData, groupClass, badgeClass, icon) {
                if (groupData.length === 0) {
                    return `
                    <div class="group-card">
                        <div class="group-header">
                            <div class="group-title">${icon} ${groupName} <span class="group-badge ${badgeClass}">0人</span></div>
                        </div>
                        <div style="padding:20px;text-align:center;color:#555;">暂无选手</div>
                    </div>`;
                }
                const ranked = computeGroupRanks(groupData);
                const groupBest = ranked.filter(p => p.score !== null && !isNaN(p.score)).reduce((max, p) => Math.max(max, p
                    .score), -Infinity);
                const bestDisplay = groupBest === -Infinity ? '-' : (Number.isInteger(groupBest) ? String(groupBest) : String(
                    Math.round(groupBest * 100) / 100));
                let rowsHtml = '';
                ranked.forEach(p => {
                    const rankClass = p.rank ? getRankClass(p.rank) : 'rank-na';
                    const rowClass = p.rank ? getRowClass(p.rank) : '';
                    const medalHtml = p.rank && p.rank <= 3 ?
                        `<span class="rank-medal ${rankClass}">${['🥇','🥈','🥉'][p.rank-1]}</span>` :
                        (p.rank ? `<span class="rank-normal">#${p.rank}</span>` :
                            `<span class="rank-na">-</span>`);
                    const statusClass = p.status === '撤离成功' ? 'status-success' : p.status === '撤离失败' ?
                        'status-danger' : '';
                    const statusValue = p.status || '';
                    const scoreValue = (p.score !== null && !isNaN(p.score)) ? p.score : '';
                    rowsHtml += `
                    <tr class="${rowClass}" data-id="${p.id}">
                        <td class="rank-cell">${medalHtml}</td>
                        <td><input type="text" class="table-input name-input name-field" value="${escapeAttr(p.name)}" data-id="${p.id}" placeholder="姓名" autocomplete="off"></td>
                        <td><input type="text" class="table-input status-input status-field ${statusClass}" value="${escapeAttr(statusValue)}" data-id="${p.id}" placeholder="1或2" title="输入1=撤离成功，2=撤离失败" autocomplete="off"></td>
                        <td><input type="number" class="table-input score-input score-field" value="${scoreValue}" data-id="${p.id}" placeholder="分数" step="any" autocomplete="off"></td>
                        <td><button class="delete-btn" data-id="${p.id}" title="删除">✕</button></td>
                    </tr>`;
                });

                return `
                <div class="group-card">
                    <div class="group-header">
                        <div class="group-title">${icon} ${groupName} <span class="group-badge ${badgeClass}">${groupData.length}人</span></div>
                        <div class="group-stats">
                            <span>🏅 组内最高：<span class="stat-val">${bestDisplay}</span></span>
                            <span>📊 已填成绩：<span class="stat-val">${ranked.filter(p=>p.score!==null && !isNaN(p.score)).length}</span></span>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th style="width:65px;">排名</th><th style="width:130px;">👤 姓名</th><th style="width:130px;">🚁 撤离状态</th><th style="width:100px;">🎯 成绩</th><th style="width:50px;">操作</th></tr></thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>`;
            }

            function renderAllGroups() {
                const grouped = getGroupedData();
                const html = `
                    ${renderGroupCard('撤离成功', grouped.success, 'group-success', 'badge-success', '✅')}
                    ${renderGroupCard('撤离失败', grouped.fail, 'group-danger', 'badge-danger', '❌')}
                    ${renderGroupCard('未标记', grouped.pending, 'group-pending', 'badge-pending', '❓')}
                `;
                document.getElementById('groupsContainer').innerHTML = html;
                updateGlobalStats(grouped);
                bindTableEvents();
            }

            function updateGlobalStats(grouped) {
                const total = participants.length;
                const successCount = grouped.success.length;
                const failCount = grouped.fail.length;
                const pendingCount = grouped.pending.length;
                const allScored = participants.filter(p => p.score !== null && !isNaN(p.score));
                let globalBest = '-';
                if (allScored.length > 0) {
                    const maxVal = Math.max(...allScored.map(p => p.score));
                    globalBest = Number.isInteger(maxVal) ? String(maxVal) : String(Math.round(maxVal * 100) / 100);
                }
                document.getElementById('statTotal').textContent = total;
                document.getElementById('statSuccess').textContent = successCount;
                document.getElementById('statFail').textContent = failCount;
                document.getElementById('statPending').textContent = pendingCount;
                document.getElementById('statBest').textContent = globalBest;
            }

            function bindTableEvents() {
                document.querySelectorAll('.name-field').forEach(input => {
                    input.addEventListener('input', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (p) { p.name = this.value.trim();
                            saveData(); }
                    });
                    input.addEventListener('blur', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (p && p.name !== this.value.trim()) {
                            p.name = this.value.trim();
                            saveData();
                            refreshDisplay();
                        }
                    });
                });

                document.querySelectorAll('.status-field').forEach(input => {
                    input.addEventListener('input', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (!p) return;
                        const raw = this.value;
                        if (raw === '1') {
                            this.value = '撤离成功';
                            p.status = '撤离成功';
                            updateStatusStyle(this);
                            saveData();
                            refreshDisplay();
                            return;
                        }
                        if (raw === '2') {
                            this.value = '撤离失败';
                            p.status = '撤离失败';
                            updateStatusStyle(this);
                            saveData();
                            refreshDisplay();
                            return;
                        }
                        p.status = raw.trim();
                        updateStatusStyle(this);
                        saveData();
                    });
                    input.addEventListener('blur', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (!p) return;
                        const trimmed = this.value.trim();
                        if (trimmed === '1') {
                            this.value = '撤离成功';
                            p.status = '撤离成功';
                        } else if (trimmed === '2') {
                            this.value = '撤离失败';
                            p.status = '撤离失败';
                        } else {
                            p.status = trimmed;
                        }
                        updateStatusStyle(this);
                        saveData();
                        refreshDisplay();
                    });
                    updateStatusStyle(input);
                });

                document.querySelectorAll('.score-field').forEach(input => {
                    input.addEventListener('input', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (!p) return;
                        const val = this.value.trim();
                        if (val === '' || val === '-') p.score = null;
                        else {
                            const num = parseFloat(val);
                            p.score = isNaN(num) ? null : num;
                        }
                        saveData();
                    });
                    input.addEventListener('blur', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (!p) return;
                        const val = this.value.trim();
                        if (val === '' || val === '-') { p.score = null;
                            this.value = ''; } else {
                            const num = parseFloat(val);
                            if (isNaN(num)) { p.score = null;
                                this.value = ''; } else { p.score = num;
                                this.value = String(num); }
                        }
                        saveData();
                        refreshDisplay();
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        const p = participants.find(x => x.id === id);
                        if (confirm(`确定删除「${p?.name || '未知'}」？`)) {
                            participants = participants.filter(x => x.id !== id);
                            saveData();
                            refreshDisplay();
                            showToast('已删除', 'info');
                        }
                    });
                });
            }

            function updateStatusStyle(input) {
                const val = input.value.trim();
                input.classList.remove('status-success', 'status-danger');
                if (val === '撤离成功') input.classList.add('status-success');
                else if (val === '撤离失败') input.classList.add('status-danger');
            }

            function refreshDisplay() {
                const activeEl = document.activeElement;
                const activeId = activeEl ? activeEl.getAttribute('data-id') : null;
                const activeClass = activeEl ? activeEl.className : '';
                renderAllGroups();
                if (activeId) {
                    setTimeout(() => {
                        const target = document.querySelector(`[data-id="${activeId}"].${activeClass.split(' ').join('.')}`);
                        if (target && target.tagName === 'INPUT') {
                            target.focus();
                            const len = target.value.length;
                            target.setSelectionRange(len, len);
                        }
                    }, 60);
                }
            }

            function parseNameList(text) {
                let lines = text.split(/[\n\r]+/).map(s => s.trim()).filter(s => s.length > 0);
                if (lines.length <= 1 && text.includes(',')) lines = text.split(/[,，]+/).map(s => s.trim()).filter(s => s
                    .length > 0);
                if (lines.length <= 1 && /[，、；;｜|\t]/.test(text)) lines = text.split(/[，、；;｜|\t]+/).map(s => s.trim())
                    .filter(s => s.length > 0);
                return lines;
            }

            function importNames(names, replace = true) {
                if (names.length === 0) { showToast('未识别到有效姓名', 'warning'); return; }
                if (replace) {
                    participants = names.map(name => ({ id: generateId(), name, status: '', score: null }));
                } else {
                    participants = [...participants, ...names.map(name => ({ id: generateId(), name, status: '',
                        score: null }))];
                }
                saveData();
                refreshDisplay();
                showToast(`✅ 已${replace?'导入':'追加'} ${names.length} 名选手`, 'success');
            }

            function exportBackup() {
                const data = { version: 2, exportedAt: new Date().toISOString(), participants: participants.map(p => ({ id: p
                            .id, name: p.name, status: p.status, score: p.score })) };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `排行榜备份_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('备份已下载', 'success');
            }

            function importBackupFile(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.participants && Array.isArray(data.participants)) {
                            participants = data.participants.map(item => ({
                                id: item.id || generateId(),
                                name: String(item.name || '').trim(),
                                status: ['撤离成功', '撤离失败'].includes(item.status) ? item.status : '',
                                score: (item.score !== null && item.score !== undefined && !isNaN(Number(item
                                    .score))) ? Number(item.score) : null,
                            }));
                            saveData();
                            refreshDisplay();
                            showToast(`备份已恢复，共 ${participants.length} 人`, 'success');
                        } else showToast('备份格式不正确', 'warning');
                    } catch (err) { showToast('备份解析失败', 'warning'); }
                };
                reader.readAsText(file);
            }

            function showToast(msg, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
            }

            function init() {
                loadData();
                renderAllGroups();

                document.getElementById('btnImport').addEventListener('click', () => {
                    const text = document.getElementById('importTextInput').value.trim();
                    if (!text) return showToast('请粘贴名单', 'warning');
                    const names = parseNameList(text);
                    if (names.length === 0) return showToast('未识别到姓名', 'warning');
                    if (participants.length > 0 && !confirm('导入将替换现有数据，确定吗？')) return;
                    importNames(names, true);
                    document.getElementById('importTextInput').value = '';
                });
                document.getElementById('btnAppendImport').addEventListener('click', () => {
                    const text = document.getElementById('importTextInput').value.trim();
                    if (!text) return showToast('请粘贴名单', 'warning');
                    const names = parseNameList(text);
                    if (names.length === 0) return showToast('未识别到姓名', 'warning');
                    importNames(names, false);
                    document.getElementById('importTextInput').value = '';
                });
                document.getElementById('fileInput').addEventListener('change', function() {
                    if (!this.files[0]) return;
                    const reader = new FileReader();
                    reader.onload = e => {
                        const names = parseNameList(e.target.result);
                        if (names.length === 0) return showToast('文件中无有效姓名', 'warning');
                        if (participants.length > 0 && !confirm('导入将替换现有数据，确定吗？')) return;
                        importNames(names, true);
                    };
                    reader.readAsText(this.files[0]);
                    this.value = '';
                });
                document.getElementById('btnAddOne').addEventListener('click', () => {
                    const name = prompt('参赛者姓名：');
                    if (name && name.trim()) {
                        participants.push({ id: generateId(), name: name.trim(), status: '', score: null });
                        saveData();
                        refreshDisplay();
                        showToast(`已添加「${name.trim()}」`, 'success');
                    }
                });
                document.getElementById('btnClearAll').addEventListener('click', () => {
                    if (participants.length === 0) return showToast('列表已空', 'info');
                    if (confirm(`清空全部 ${participants.length} 名选手数据？不可恢复！`)) {
                        participants = [];
                        saveData();
                        refreshDisplay();
                        showToast('已清空', 'warning');
                    }
                });
                document.getElementById('btnExport').addEventListener('click', () => {
                    if (participants.length === 0) return showToast('无数据可导出', 'info');
                    exportBackup();
                });
                document.getElementById('backupFileInput').addEventListener('change', function() {
                    if (!this.files[0]) return;
                    if (participants.length > 0 && !confirm('恢复将覆盖现有数据，确定吗？')) { this.value = ''; return; }
                    importBackupFile(this.files[0]);
                    this.value = '';
                });
                document.getElementById('importTextInput').addEventListener('keydown', e => {
                    if (e.key === 'Enter') { e.preventDefault();
                        document.getElementById('btnImport').click(); }
                });
                window.addEventListener('beforeunload', saveData);
                setInterval(saveData, 5000);
            }

            init();
        })();
    </script>
</body>
</html>
